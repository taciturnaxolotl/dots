name: Deploy NixOS Configurations

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    outputs:
      generations: ${{ steps.capture.outputs.generations }}

    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:deploy
          use-cache: "true"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Capture generations
        id: capture
        run: |
          GENERATIONS='{}'
          for NODE in terebithia; do
            GEN=$(ssh kierank@${NODE} \
              "readlink /nix/var/nix/profiles/system | grep -oP 'system-\K[0-9]+'")
            GENERATIONS=$(echo "$GENERATIONS" | jq -c --arg node "$NODE" --arg gen "$GEN" '. + {($node): $gen}')
          done
          echo "generations=$GENERATIONS" >> "$GITHUB_OUTPUT"

  deploy:
    needs: pre-deploy
    strategy:
      fail-fast: false
      matrix:
        node:
          - name: terebithia
            arch: aarch64-linux

    name: ${{ matrix.node.name }}
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - name: Get pre-deploy generation
        id: pre-gen
        run: |
          GEN=$(echo '${{ needs.pre-deploy.outputs.generations }}' | jq -r '.${{ matrix.node.name }}')
          echo "gen=$GEN" >> "$GITHUB_OUTPUT"

      - name: Create deployment
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: ${{ matrix.node.name }}
          description: "gen ${{ steps.pre-gen.outputs.gen }} → ?"
          initial-status: in_progress
          auto-inactive: true

      - uses: actions/checkout@v6

      - name: Count commits
        id: commits
        run: |
          BEFORE="${{ github.event.before }}"
          COUNT=$(git rev-list --count "${BEFORE}..${{ github.sha }}" 2>/dev/null || echo 1)
          [ -z "$BEFORE" ] && COUNT=1
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            extra-platforms = aarch64-linux

      - name: Set up QEMU
        if: matrix.node.arch == 'aarch64-linux'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:deploy
          use-cache: "true"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Deploy ${{ matrix.node.name }}
        run: |
          nix run 'github:serokell/deploy-rs' -- \
            --skip-checks \
            --remote-build \
            --ssh-user kierank \
            --ssh-opts="-o StrictHostKeyChecking=accept-new" \
            .#${{ matrix.node.name }}

      - name: Capture new generation
        id: post-gen
        if: success()
        run: |
          GEN=$(ssh kierank@${{ matrix.node.name }} \
            "readlink /nix/var/nix/profiles/system | grep -oP 'system-\K[0-9]+'")
          echo "gen=$GEN" >> "$GITHUB_OUTPUT"

      - name: Update deployment (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success
          log-url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          description: "gen ${{ steps.pre-gen.outputs.gen }} → ${{ steps.post-gen.outputs.gen }} (+${{ steps.commits.outputs.count }} commits)"

      - name: Update deployment (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure
          log-url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          description: "gen ${{ steps.pre-gen.outputs.gen }} → failed (+${{ steps.commits.outputs.count }} commits)"

      - name: Update deployment (cancelled)
        if: cancelled()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: error
          log-url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          description: "gen ${{ steps.pre-gen.outputs.gen }} → cancelled"

  rollback:
    needs: [pre-deploy, deploy]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:deploy
          use-cache: "true"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Rollback all nodes
        env:
          GENERATIONS: ${{ needs.pre-deploy.outputs.generations }}
        run: |
          echo "$GENERATIONS" | jq -r 'to_entries[] | "\(.key) \(.value)"' | \
          while read -r NODE GEN; do
            echo "::group::rollback $NODE → generation $GEN"
            ssh kierank@${NODE} "
              sudo nix-env -p /nix/var/nix/profiles/system --switch-generation ${GEN}
              sudo /nix/var/nix/profiles/system/bin/switch-to-configuration switch
            "
            echo "::endgroup::"
          done

  docs:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Build docs
        run: nix build .#packages.x86_64-linux.docs -L

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy result --project-name=dots-docs
